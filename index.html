<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kizkka | Plataforma Global de Comercio.</title>
    <meta name="description" content="Potencia tu negocio con Kizkka. Conectamos vendedores internacionales con el mercado B2B, ofreciendo logística eficiente y los mejores precios.">
    <meta name="author" content="Kizkka" />
    <meta name="keywords" content="B2B, B2C, marketplace, ecommerce, comercio, logística, Kizkka">

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" id="og-url" content="" />
    <meta property="og:site_name" content="Kizkka" />
    <meta property="og:title" id="og-title" content="Kizkka - Soluciones de ecommerce sin fronteras" />
    <meta property="og:description" id="og-description" content="Transforma tu manera de vender. Gestión de pedidos, logística internacional y precios B2B en una sola plataforma." />
    <meta property="og:image" id="og-image" content="https://fonvunyiaxcjkodrnpox.supabase.co/storage/v1/object/public/branding-assets/dialog_share_image_url-1773679883600.png" />
    <meta property="og:locale" content="es_HT" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" id="tw-title" content="Kizkka - Soluciones de ecommerce sin fronteras" />
    <meta name="twitter:description" id="tw-description" content="Transforma tu manera de vender. Gestión de pedidos, logística internacional y precios B2B en una sola plataforma." />
    <meta name="twitter:image" id="tw-image" content="https://fonvunyiaxcjkodrnpox.supabase.co/storage/v1/object/public/branding-assets/dialog_share_image_url-1773679883600.png" />

    <link rel="canonical" href="https://kizkka.com" />
    <link rel="icon" id="favicon-link" type="image/png" href="/favicon.png" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Kizkka",
      "url": "https://kizkka.com",
      "description": "Plataforma Global de Comercio B2B2C"
    }
    </script>

    <script>
      (function () {
        try {
          var raw = localStorage.getItem('branding_settings_cache');
          if (!raw) return;
          var b = JSON.parse(raw);

          // Tab title
          var title = b.browser_tab_title || (b.platform_name ? b.platform_name + (b.platform_slogan ? ' | ' + b.platform_slogan : '') : '');
          if (title) document.title = title;

          // Meta description
          if (b.browser_meta_description) {
            var descMeta = document.querySelector('meta[name="description"]');
            if (descMeta) descMeta.setAttribute('content', b.browser_meta_description);
          }

          // OG / Twitter tags from share_* fields
          if (b.share_title) {
            var ogT = document.getElementById('og-title');
            var twT = document.getElementById('tw-title');
            if (ogT) ogT.setAttribute('content', b.share_title);
            if (twT) twT.setAttribute('content', b.share_title);
          }
          if (b.share_description) {
            var ogD = document.getElementById('og-description');
            var twD = document.getElementById('tw-description');
            if (ogD) ogD.setAttribute('content', b.share_description);
            if (twD) twD.setAttribute('content', b.share_description);
          }
          if (b.share_image_url) {
            var ogI = document.getElementById('og-image');
            var twI = document.getElementById('tw-image');
            if (ogI) ogI.setAttribute('content', b.share_image_url);
            if (twI) twI.setAttribute('content', b.share_image_url);
          }

          // Favicon
          if (b.favicon_url) {
            var fav = document.getElementById('favicon-link');
            if (fav) fav.setAttribute('href', b.favicon_url);
          }

          // OG URL
          var ogUrl = document.getElementById('og-url');
          if (ogUrl) ogUrl.setAttribute('content', window.location.href);
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
