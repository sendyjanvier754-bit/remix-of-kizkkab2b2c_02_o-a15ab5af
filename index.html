    <script>
      (function () {
        try {
          var raw = localStorage.getItem('branding_settings_cache');
          if (!raw) return;
          var branding = JSON.parse(raw);
          var tabTitle = branding.browser_tab_title || '';
          var name = branding.platform_name || '';
          var slogan = branding.platform_slogan || '';
          var nextTitle = tabTitle || (name ? (name + (slogan ? ' | ' + slogan : '')) : '');
          if (nextTitle) document.title = nextTitle;
        } catch (_) {}
      })();
    </script>
